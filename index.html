<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B.E.R.T.H. | BOC Examination Rating Transfer Host</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --boc-blue: #002d5a; --boc-gold: #c5a059; --light-bg: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--light-bg); margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        header { background: var(--boc-blue); color: white; padding: 25px; border-bottom: 5px solid var(--boc-gold); text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); width: 100%; max-width: 450px; text-align: center; }
        h2 { color: var(--boc-blue); margin-bottom: 25px; font-weight: 700; }
        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; font-size: 0.9rem; }
        input { width: 100%; padding: 14px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 16px; background: var(--boc-blue); color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #004080; transform: translateY(-2px); }
        button:disabled { background: #999; cursor: not-allowed; }
        #message { margin-top: 25px; min-height: 50px; }
        .success-box { background: #e7f3ef; color: #2d5a45; padding: 20px; border-radius: 8px; border: 1px solid #d1e7dd; }
        .error-text { color: #dc3545; font-weight: bold; }
        .download-btn { display: inline-block; margin-top: 15px; padding: 12px 25px; background: var(--boc-gold); color: white; text-decoration: none; border-radius: 5px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        footer { padding: 20px; text-align: center; font-size: 0.85rem; color: #666; background: #fff; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 2.2rem; font-weight: 900; letter-spacing: 3px; margin-bottom: 5px;">B.E.R.T.H.</div>
    <div style="font-size: 0.9rem; letter-spacing: 1px; opacity: 0.9;">BOC EXAMINATION RATING TRANSFER HOST</div>
</header>

<div class="container">
    <div class="card">
        <h2>Secure Rating Retrieval</h2>
        <div class="input-group">
            <label>Registered Email Address</label>
            <input type="email" id="email" placeholder="juan.delacruz@example.com">
        </div>
        <div class="input-group">
            <label>Contact Number (as registered)</label>
            <input type="text" id="contact" placeholder="9171234567">
        </div>
        <button id="submitBtn" onclick="verifyUser()">GENERATE CERTIFICATE PDF</button>
        <div id="message"></div>
    </div>
</div>

<footer>
    &copy; 2026 Bureau of Customs | Official Score Retrieval System <br>
    Secure & Confidential | HRMD-IAG
</footer>

<script>
    // --- REPLACE THESE WITH YOUR ACTUAL SUPABASE KEYS ---
    const SB_URL = "https://ywbppvtwsnmloqgwhxla.supabase.co"; 
    const SB_KEY = "sb_publishable_wAqtDS8qfZM2urgJX9I6Dg_MUIIf7pz"; 
    // ----------------------------------------------------

    const supabase = window.supabase.createClient(SB_URL, SB_KEY);

    async function verifyUser() {
        const btn = document.getElementById('submitBtn');
        const msg = document.getElementById('message');
        const emailInput = document.getElementById('email').value.trim();
        const contactInput = document.getElementById('contact').value.trim();

        if (!emailInput || !contactInput) {
            msg.innerHTML = "<span class='error-text'>Please enter both fields.</span>";
            return;
        }

        btn.disabled = true;
        msg.innerHTML = "<p>Connecting to B.E.R.T.H. database...</p>";

        try {
            const { data, error } = await supabase
                .from('COR') // Matches your table name
                .select('*')
                .eq('EMAIL ADDRESS REGISTERED ON IAMS', emailInput)
                .eq('CONTACT NO. REGISTERED ON IAMS', contactInput)
                .single();

            if (error || !data) {
                msg.innerHTML = "<span class='error-text'>Authentication Failed.<br>Details do not match our records.</span>";
                btn.disabled = false;
            } else {
                const downloadUrl = data['COR URL']; // Column from your screenshot
                msg.innerHTML = `
                    <div class="success-box">
                        <strong>Identity Verified!</strong><br>
                        Score for: ${data['POSITION'] || 'Applicant'}<br><br>
                        <a href="${downloadUrl}" target="_blank" class="download-btn">📥 DOWNLOAD CERTIFICATE</a>
                    </div>`;
            }
        } catch (err) {
            msg.innerHTML = "<span class='error-text'>Server Timeout. Please try again.</span>";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
